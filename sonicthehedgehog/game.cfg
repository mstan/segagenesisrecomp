# game.cfg — Sonic the Hedgehog (Sega Genesis/Mega Drive, 1991)
# 68000, 512KB ROM, no SRAM, no mapper
# CRC32 (JUE REV00): 0xF9394E97
# Product serial: GM 00001009-00  (header $0180)
# Internal checksum: $264A         (header $018E)
# Revision: 00 (original JUE release)

output_prefix sonic

# Annotations: full s1disasm REV00 label set (~6400 entries)
annotations annotations_from_disasm.csv

# Blacklist: addresses that must never become function entry points.
# Prevents both symbol entries AND auto-discovered splits.
blacklist_file blacklist.txt

# Function symbols — generated from s1disasm + runtime discovery.
# Replaces the old extra_func entries. See sonic1.syms.toml for details.
symbols_file sonic1.syms.toml

# No bank switching — flat address space from $000000 to $07FFFF

# Protected ranges: boundary splitting is disabled for these address ranges.
# The sound driver + music data ($071000-$07FFFF) breaks when aggressively split.
protected_range 071000 07FFFF

# VBlank wait function — emit glue_yield_for_vblank() instead of spin loop
vblank_yield 0029A8
