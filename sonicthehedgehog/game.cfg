# game.cfg — Sonic the Hedgehog (Sega Genesis/Mega Drive, 1991)
# 68000, 512KB ROM, no SRAM, no mapper
# CRC32 (JUE REV00): 0xF9394E97
# Product serial: GM 00001009-00  (header $0180)
# Internal checksum: $264A         (header $018E)
# Revision: 00 (original JUE release)

output_prefix sonic

# Annotations: full s1disasm REV00 label set (~7300 entries)
annotations annotations_from_disasm.csv

# ---------------------------------------------------------------------------
# Auto-generated seed files (regen via the gen_disasm_*.py tools — paths
# are relative to this cfg). The cfg only carries IRREDUCIBLE entries:
# things the auto-extractors can't yet identify from the disasm alone.
# ---------------------------------------------------------------------------

# Static JSR/BSR targets from sonic.lst — function_finder seeds.
extra_func_file sonic1.disasm_seeds.txt

# Every named subroutine label that's neither a JSR/BSR target nor in
# this cfg. Coverage gap that shrinks as discovery improves.
extra_func_file sonic1.disasm_subs.txt

# PC-indexed jump tables (PCREL_W / ABS_L / bra.w / bra.s shapes)
# extracted from sonic.lst. Includes both the trampoline addresses and
# the bra-destination handlers (since the trampoline body becomes a
# tail call to the destination in codegen).
jump_table_file sonic1.disasm_jumptables.txt

# ---------------------------------------------------------------------------
# Residual extra_func entries — dispatch targets the auto-extractors
# don't yet identify. Each is a coverage gap; ideally this list shrinks
# to zero as the extractors improve. Names are from s1disasm where known.
# ---------------------------------------------------------------------------

