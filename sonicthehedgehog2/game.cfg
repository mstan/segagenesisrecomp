# game.cfg — Sonic the Hedgehog 2 (Sega Genesis/Mega Drive, 1992)
# 68000, 1MB ROM, no SRAM, no mapper
# Product serial: GM 00001051-01  (header $0180)
# Internal checksum: $D951        (header $018E)
# Region: JUE
# Entry PC: $000206 (vector $000004)
# VBlank handler: $000408 (vector $000078)
# HBlank handler: $000F54 (vector $000070)
#
# STATUS: Phase 2 wired — annotations + disasm seeds + disasm subs from
# s2disasm REV01 build (sha256-verified to match user's sonic2.bin).
# Regenerate the three files via:
#
#   cd <segagenesisrecomp-root>
#   python tests/tools/gen_l1_fixtures.py \
#       --lst sonicthehedgehog2/s2disasm/s2.lst \
#       -o tests/fixtures/sonic2/l1/instructions.txt
#   python tests/tools/gen_disasm_seeds.py \
#       --instructions tests/fixtures/sonic2/l1/instructions.txt \
#       -o sonicthehedgehog2/sonic2.disasm_seeds.txt --rom-max 0x100000
#   python tests/tools/gen_disasm_subs.py \
#       --lst sonicthehedgehog2/s2disasm/s2.lst \
#       --code-addrs tests/fixtures/sonic2/l1/code_addresses.txt \
#       --game-cfg sonicthehedgehog2/game.cfg \
#       --disasm-seeds sonicthehedgehog2/sonic2.disasm_seeds.txt \
#       -o sonicthehedgehog2/sonic2.disasm_subs.txt
#   python tests/tools/gen_annotations_csv.py \
#       --lst sonicthehedgehog2/s2disasm/s2.lst \
#       --code-addrs tests/fixtures/sonic2/l1/code_addresses.txt \
#       -o sonicthehedgehog2/annotations_from_disasm.csv
#   python tests/tools/gen_disasm_jumptables.py \
#       --lst sonicthehedgehog2/s2disasm/s2.lst \
#       --code-addrs tests/fixtures/sonic2/l1/code_addresses.txt \
#       --prefix sonic2 --rom-max 0x100000 \
#       -o sonicthehedgehog2/sonic2.disasm_jumptables.txt

output_prefix sonic2

# Annotation CSV: 2949 (addr,name) pairs — surfaces meaningful labels
# in generated C (e.g. EntryPoint, VBlank instead of func_000206).
annotations annotations_from_disasm.csv

# Static JSR/BSR targets extracted from s2.lst — every disasm-confirmed
# subroutine the static call-graph walk should seed.
extra_func_file sonic2.disasm_seeds.txt

# Every named subroutine label that's NOT in the seeds file or in this
# game.cfg — coverage gap that will shrink as discovery improves.
extra_func_file sonic2.disasm_subs.txt

# Static PC-indexed jump tables extracted by walking s2.lst for runs
# of `dc.w X-Base` (PCREL_W) and `dc.l X` (ABS_L) entries whose
# targets all resolve to in-ROM code addresses. Provides explicit
# enumeration for tables the recompiler's auto-discovery can't follow.
jump_table_file sonic2.disasm_jumptables.txt

# ---------------------------------------------------------------------------
# Interrupt vectors (from 68K vector table)
extra_func 000206   # EntryPoint — initial PC ($000004)
extra_func 000408   # VBlank (IRQ level 6) — vector $000078
extra_func 000F54   # HBlank (IRQ level 4) — vector $000070

